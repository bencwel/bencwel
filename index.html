<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Bencwel</title>
    
</head>
<style>
    body{
        text-align: center;
        background-image: url(tlo.png);
        

    }
    *{
        margin: none;
    }
    table{
        margin: auto;
        border: 1px solid black;
        
    }
    td{
        padding: 2px;
        border: 1px solid black;
        box-shadow: 5px 5px black;
        border-radius: 15px;
    }
    img{
        height: 550px;
        width: 200px;
    }
    img:hover{
        cursor: pointer;
    }
    h1{
        color: white;
        text-shadow:  3px 3px black;
        background-color: black;
        width: 450px;
        margin: auto;
    }
    #gitara{
        width: 70vw;
        border: 1px solid black;
        box-shadow: 5px 5px black;
        border-radius: 15px;
        display: block;
        margin: 0 auto;
    }
</style>
<body>
    <h1>Bencwel Janoszczyk</h1>
    <table id="galeria"></table>
    <script>

    const ileZdjec = 8; // Ile obrazów w folderze img

    const tabela = document.getElementById("galeria");
    let tr;

    for(let i = 1; i <= ileZdjec; i++){
        if((i-1) % 4 === 0){
            tr = document.createElement("tr");
            tabela.appendChild(tr);
        }

        const td = document.createElement("td");
        const img = document.createElement("img");

        img.src = "img/benek" + i + ".png";

        td.appendChild(img);
        tr.appendChild(td);
    }
</script>
    <br>
    <video id="gitara" controls playsinline webkit-playsinline>
          <source src="film.mp4" type="video/mp4">
    </video>






    
</body>
</html>
